<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード — My Super Secretary</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --sage: #7a9e7e; --sage-light: #a8c5ac; --sage-dark: #4f7a54;
      --cream: #faf7f2; --warm: #f5efe6;
      --text: #2d2d2d; --muted: #6b6b6b; --accent: #d4956a;
      --white: #ffffff; --red: #e05555;
    }
    body { font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

    nav { position: fixed; top: 0; width: 100%; background: rgba(250,247,242,0.96); backdrop-filter: blur(14px); padding: 12px 32px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid rgba(122,158,126,0.18); }
    .logo { font-size: 1rem; font-weight: 800; color: var(--sage-dark); text-decoration: none; letter-spacing: 0.02em; }
    .logo span { color: var(--accent); }
    .nav-links { display: flex; list-style: none; gap: 4px; }
    .nav-links a { text-decoration: none; color: var(--muted); font-size: 0.82rem; padding: 6px 14px; border-radius: 20px; transition: all 0.2s; font-weight: 500; }
    .nav-links a:hover { background: var(--warm); color: var(--sage-dark); }
    .nav-links a.active { background: var(--sage-dark); color: white; }

    .page { padding: 88px 32px 48px; max-width: 1100px; margin: 0 auto; }

    .page-header { margin-bottom: 28px; }
    .page-header .date-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
    .page-header h1 { font-size: 1.7rem; font-weight: 900; }
    .page-header h1 em { font-style: normal; color: var(--sage-dark); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }

    .card { background: var(--white); border-radius: 18px; padding: 22px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
    .card-title { font-size: 0.71rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .card-link { font-size: 0.75rem; color: var(--sage-dark); text-decoration: none; font-weight: 600; letter-spacing: 0; text-transform: none; }

    /* Schedule items */
    .sch-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0ebe4; }
    .sch-item:last-child { border-bottom: none; }
    .sch-time { font-size: 0.74rem; font-weight: 700; color: var(--muted); width: 86px; flex-shrink: 0; padding-top: 2px; line-height: 1.4; }
    .sch-body {}
    .sch-name { font-size: 0.88rem; font-weight: 600; }
    .sch-role { font-size: 0.72rem; margin-top: 2px; font-weight: 600; }

    /* Task items */
    .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f0ebe4; }
    .task-item:last-child { border-bottom: none; }
    .task-item input[type=checkbox] { width: 16px; height: 16px; margin-top: 2px; accent-color: var(--sage-dark); flex-shrink: 0; cursor: pointer; }
    .task-meta { flex: 1; min-width: 0; }
    .task-name { font-size: 0.87rem; font-weight: 500; }
    .task-name.done { text-decoration: line-through; opacity: 0.38; }
    .task-info { display: flex; gap: 8px; margin-top: 3px; align-items: center; }
    .task-due { font-size: 0.71rem; color: var(--muted); }
    .task-due.overdue { color: var(--red); font-weight: 700; }
    .chip-sm { font-size: 0.68rem; padding: 2px 7px; border-radius: 8px; font-weight: 600; }
    .prio-high { background: #fde8e8; color: #c0392b; }
    .prio-mid  { background: #fef3e0; color: #d4956a; }
    .prio-low  { background: #eaf3ea; color: #4f7a54; }

    /* Role cards */
    .role-card { background: var(--white); border-radius: 16px; padding: 18px 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); text-align: center; text-decoration: none; color: var(--text); transition: transform 0.2s, box-shadow 0.2s; display: block; }
    .role-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .role-icon { font-size: 1.5rem; margin-bottom: 7px; }
    .role-name { font-size: 0.72rem; font-weight: 700; margin-bottom: 7px; line-height: 1.3; }
    .role-count { font-size: 1.6rem; font-weight: 900; line-height: 1; }
    .role-count-label { font-size: 0.64rem; color: var(--muted); margin-top: 2px; }

    .empty-state { text-align: center; padding: 24px 0; color: var(--muted); font-size: 0.82rem; line-height: 1.8; }
    .empty-state a { color: var(--sage-dark); font-weight: 600; text-decoration: none; }

    .status-dot { width: 8px; height: 8px; background: #5ac97a; border-radius: 50%; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

    @media (max-width: 800px) {
      .grid-2 { grid-template-columns: 1fr; }
      .grid-5 { grid-template-columns: repeat(3, 1fr); }
      .page { padding: 80px 16px 40px; }
      nav { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">My<span>Super</span>Secretary</a>
  <ul class="nav-links">
    <li><a href="index.html" class="active">ホーム</a></li>
    <li><a href="schedule.html">スケジュール</a></li>
    <li><a href="tasks.html">タスク</a></li>
    <li><a href="yoga.html">🧘 ヨガ</a></li>
    <li><a href="university.html">📚 大学</a></li>
  </ul>
</nav>

<div class="page">
  <div class="page-header">
    <div class="date-label" id="todayLabel"></div>
    <h1 id="greeting"></h1>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-title">
        📅 今日のスケジュール
        <a href="schedule.html" class="card-link">すべて見る →</a>
      </div>
      <div id="todaySchedule"></div>
    </div>
    <div class="card">
      <div class="card-title">
        ✓ 今日のタスク・期限切れ
        <a href="tasks.html" class="card-link">すべて見る →</a>
      </div>
      <div id="todayTasks"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span><span class="status-dot"></span>ロール別 未完了タスク</span></div>
    <div class="grid-5" id="roleSummary"></div>
  </div>
</div>

<script>
const ROLES = [
  { id: 'yoga',   name: 'ヨガ講師',          icon: '🧘', color: '#4f7a54' },
  { id: 'univ',   name: '大学生',             icon: '📚', color: '#d4956a' },
  { id: 'ikigai', name: 'IKIGAIプロジェクト', icon: '✦',  color: '#9b7ab0' },
  { id: 'gakudo', name: '学童事業',            icon: '🏫', color: '#4a9bbf' },
  { id: 'trip',   name: '出張・研修',          icon: '✈️', color: '#a89060' },
];
const getTasks    = () => JSON.parse(localStorage.getItem('msa_tasks')    || '[]');
const getSchedule = () => JSON.parse(localStorage.getItem('msa_schedule') || '[]');
const saveTasks   = t  => localStorage.setItem('msa_tasks', JSON.stringify(t));

const today = new Date();
const todayStr = today.toISOString().slice(0,10);
const DAYS = ['日','月','火','水','木','金','土'];
const hour = today.getHours();
const greet = hour < 12 ? 'おはようございます' : hour < 18 ? 'こんにちは' : 'こんばんは';

document.getElementById('todayLabel').textContent =
  `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日（${DAYS[today.getDay()]}）`;
document.getElementById('greeting').innerHTML = `<em>${greet}</em>、今日も一日がんばりましょう。`;

// Today's schedule
const schItems = getSchedule().filter(s => s.date === todayStr).sort((a,b)=>a.startTime.localeCompare(b.startTime));
const schEl = document.getElementById('todaySchedule');
if (schItems.length) {
  schEl.innerHTML = schItems.map(s => {
    const r = ROLES.find(r=>r.id===s.role)||{icon:'',name:s.role,color:'#999'};
    return `<div class="sch-item">
      <div class="sch-time">${s.startTime}–${s.endTime}</div>
      <div class="sch-body">
        <div class="sch-name">${s.title}</div>
        <div class="sch-role" style="color:${r.color}">${r.icon} ${r.name}</div>
      </div>
    </div>`;
  }).join('');
} else {
  schEl.innerHTML = `<div class="empty-state">今日のスケジュールはありません<br><a href="schedule.html">追加する →</a></div>`;
}

// Today's tasks (overdue + due today)
const tasks = getTasks();
const todayTasks = tasks.filter(t => !t.completed && t.dueDate <= todayStr)
  .sort((a,b) => a.dueDate.localeCompare(b.dueDate));
const taskEl = document.getElementById('todayTasks');
if (todayTasks.length) {
  const prioMap = { high: ['高', 'prio-high'], medium: ['中', 'prio-mid'], low: ['低', 'prio-low'] };
  taskEl.innerHTML = todayTasks.map(t => {
    const overdue = t.dueDate < todayStr;
    const [prioLabel, prioClass] = prioMap[t.priority] || ['中','prio-mid'];
    return `<div class="task-item">
      <input type="checkbox" onchange="toggleTask('${t.id}')">
      <div class="task-meta">
        <div class="task-name">${t.title}</div>
        <div class="task-info">
          <span class="task-due ${overdue?'overdue':''}">${overdue?'⚠ 期限切れ ':''} ${t.dueDate}</span>
          <span class="chip-sm ${prioClass}">${prioLabel}</span>
        </div>
      </div>
    </div>`;
  }).join('');
} else {
  taskEl.innerHTML = `<div class="empty-state">今日の期限タスクはありません<br><a href="tasks.html">タスクを追加する →</a></div>`;
}

// Role summary
document.getElementById('roleSummary').innerHTML = ROLES.map(r => {
  const cnt = tasks.filter(t => t.role === r.id && !t.completed).length;
  return `<a href="tasks.html?role=${r.id}" class="role-card">
    <div class="role-icon">${r.icon}</div>
    <div class="role-name">${r.name}</div>
    <div class="role-count" style="color:${r.color}">${cnt}</div>
    <div class="role-count-label">未完了</div>
  </a>`;
}).join('');

function toggleTask(id) {
  const t = getTasks();
  const item = t.find(x=>x.id===id);
  if (item) { item.completed = true; saveTasks(t); location.reload(); }
}
</script>
</body>
</html>
